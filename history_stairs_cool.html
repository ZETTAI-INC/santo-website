<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沿革（ダイナミック・ステップ・タイムライン）</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap');

        :root {
            --primary: #2563eb;
            --accent: #06b6d4;
            /* Cyan accent for a tech/modern feel */
            --bg-color: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            /* Subtle background grid for a modern tech feel */
            background-image:
                linear-gradient(rgba(37, 99, 235, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(37, 99, 235, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            margin: 0;
            padding: 80px 20px;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .history-section {
            width: 100%;
            max-width: 1000px;
            position: relative;
        }

        /* セクションヘッダー */
        .section-header {
            margin-bottom: 80px;
            position: relative;
            z-index: 10;
        }

        .section-en {
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .section-ja {
            font-size: 32px;
            font-weight: 900;
            color: var(--text-main);
            margin: 0;
            letter-spacing: 2px;
        }

        /* タイムライン・コンテナ */
        .timeline-container {
            position: relative;
            width: 100%;
            height: 550px;
            padding-top: 20px;
        }

        /* 背景の光る上昇ライン */
        .glowing-line {
            position: absolute;
            top: 100px;
            /* Start lower left */
            left: 50px;
            width: 800px;
            height: 400px;
            /* Draw a perfectly smooth curved line going up */
            background: transparent;
            z-index: 0;
        }

        .glowing-line svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .glow-path {
            fill: none;
            stroke: url(#gradient-line);
            stroke-width: 6;
            stroke-linecap: round;
            filter: drop-shadow(0 0 12px rgba(6, 182, 212, 0.6));
        }

        /* 個々のステップ（カード） */
        .step-card {
            position: absolute;
            width: 260px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 1);
            border-radius: 16px;
            padding: 24px 30px;
            box-shadow:
                0 10px 30px -5px rgba(37, 99, 235, 0.1),
                0 0 0 1px rgba(255, 255, 255, 0.5) inset;
            z-index: 10;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: default;
        }

        .step-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow:
                0 20px 40px -5px rgba(37, 99, 235, 0.15),
                0 0 20px rgba(6, 182, 212, 0.2);
            border-color: rgba(6, 182, 212, 0.3);
        }

        /* カードとラインを繋ぐ光るドット */
        .step-dot {
            position: absolute;
            width: 16px;
            height: 16px;
            background: #ffffff;
            border: 4px solid var(--primary);
            border-radius: 50%;
            top: 50%;
            left: -40px;
            transform: translateY(-50%);
            box-shadow: 0 0 15px rgba(37, 99, 235, 0.4);
            z-index: 11;
            transition: all 0.3s ease;
        }

        .step-card:hover .step-dot {
            background: var(--accent);
            border-color: #ffffff;
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.8);
            transform: translateY(-50%) scale(1.3);
        }

        /* テキスト要素 */
        .step-year {
            font-family: 'Montserrat', sans-serif;
            font-size: 28px;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 8px;
            display: block;
            letter-spacing: 1px;
        }

        .step-desc {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
        }

        /* -------------------------------------------
     配置（なだらかな階段状に上昇）
  -------------------------------------------- */
        /* 左下からスタート */
        .step-1 {
            left: 80px;
            bottom: 20px;
        }

        .step-2 {
            left: 300px;
            bottom: 140px;
        }

        .step-3 {
            left: 520px;
            bottom: 260px;
        }

        .step-4 {
            left: 740px;
            bottom: 380px;
        }

        /* ラインの接続位置微調整用の線（ドットからパスへのコネクタ） */
        .connector {
            position: absolute;
            left: -32px;
            top: 50%;
            width: 32px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(37, 99, 235, 0.3));
            z-index: 5;
        }

        /* ふわふわ浮くアニメーション */
        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-6px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .step-1 {
            animation: float 6s ease-in-out infinite 0s;
        }

        .step-2 {
            animation: float 6s ease-in-out infinite 1.5s;
        }

        .step-3 {
            animation: float 6s ease-in-out infinite 3s;
        }

        .step-4 {
            animation: float 6s ease-in-out infinite 4.5s;
        }

        /* hover時はfloatアニメーションを上書きするため、親要素と分離していますが今回はシンプルに */
        .step-card:hover {
            animation-play-state: paused;
        }
    </style>
</head>

<body>

    <div class="history-section">
        <div class="section-header">
            <div class="section-en">History</div>
            <h2 class="section-ja">沿革</h2>
        </div>

        <div class="timeline-container">

            <!-- 光る上昇ライン（SVG） -->
            <div class="glowing-line">
                <svg viewBox="0 0 800 400">
                    <defs>
                        <!-- ブルーからシアンへのグラデーション -->
                        <linearGradient id="gradient-line" x1="0%" y1="100%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#2563eb" />
                            <stop offset="100%" stop-color="#06b6d4" />
                        </linearGradient>
                    </defs>
                    <!-- なだらかに右肩上がりになる曲線 -->
                    <path class="glow-path"
                        d="M 0,330 C 200,330 250,210 300,210 C 450,210 470,90 520,90 C 650,90 700,-30 750,-30" />
                </svg>
            </div>

            <!-- ステップ1 -->
            <div class="step-card step-1">
                <div class="step-dot"></div>
                <div class="connector"></div>
                <span class="step-year">20xx</span>
                <p class="step-desc">株式会社サントー設立</p>
            </div>

            <!-- ステップ2 -->
            <div class="step-card step-2">
                <div class="step-dot"></div>
                <div class="connector"></div>
                <span class="step-year">20xx</span>
                <p class="step-desc">一般労働者派遣事業許可取得</p>
            </div>

            <!-- ステップ3 -->
            <div class="step-card step-3">
                <div class="step-dot"></div>
                <div class="connector"></div>
                <span class="step-year">20xx</span>
                <p class="step-desc">事業拡大に伴い本社移転</p>
            </div>

            <!-- ステップ4 -->
            <div class="step-card step-4">
                <div class="step-dot"></div>
                <div class="connector"></div>
                <span class="step-year">2026</span>
                <p class="step-desc">ホームページリニューアル<br>（現在に至る）</p>
            </div>

        </div>
    </div>

</body>

</html>
