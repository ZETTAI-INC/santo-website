<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6つの強み - アニメーション・ネットワーク</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');

        :root {
            --primary: #0f172a;
            --secondary: #3b82f6;
            --secondary-glow: rgba(59, 130, 246, 0.6);
            --glow: #60a5fa;
            --bg-color: #f8fafc;
            --text-main: #334155;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px),
                              radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            color: var(--text-main);
            margin: 0;
            padding: 80px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .layout-wrapper {
            position: relative;
            width: 100%;
            max-width: 1000px;
            aspect-ratio: 16 / 10;
            margin: 0 auto;
        }

        /* 中央のコア (発光する円) */
        .core-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 220px;
            height: 220px;
            background: linear-gradient(135deg, var(--primary), #1e3a8a, var(--primary));
            background-size: 200% 200%;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            z-index: 10;
            box-shadow: 0 0 50px rgba(59, 130, 246, 0.5), inset 0 0 20px rgba(96, 165, 250, 0.5);
            animation: pulse-core 4s infinite alternate, bg-shift 8s ease infinite;
        }

        @keyframes bg-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* コア周囲の装飾リング 1 */
        .core-circle::before {
            content: '';
            position: absolute;
            inset: -20px;
            border: 2px solid transparent;
            border-top-color: var(--glow);
            border-bottom-color: var(--glow);
            border-radius: 50%;
            animation: spin-reverse 15s linear infinite;
            z-index: -1;
            opacity: 0.8;
            filter: drop-shadow(0 0 10px var(--glow));
        }

        /* コア周囲の装飾リング 2 */
        .core-circle::after {
            content: '';
            position: absolute;
            inset: -40px;
            border: 1px dashed rgba(96, 165, 250, 0.4);
            border-radius: 50%;
            animation: spin 25s linear infinite;
            z-index: -2;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }
        @keyframes pulse-core {
            0% { box-shadow: 0 0 40px rgba(59, 130, 246, 0.4), inset 0 0 15px rgba(96, 165, 250, 0.4); transform: translate(-50%, -50%) scale(0.98); }
            100% { box-shadow: 0 0 80px rgba(59, 130, 246, 0.8), inset 0 0 30px rgba(96, 165, 250, 0.8); transform: translate(-50%, -50%) scale(1.02); }
        }

        .center-title {
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .center-title span {
            display: block;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.3em;
            color: var(--glow);
            margin-bottom: 8px;
            text-shadow: 0 0 10px rgba(96, 165, 250, 0.8);
        }

        .center-title h2 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            letter-spacing: 0.05em;
        }

        /* SVG アニメーション配線 */
        .svg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .svg-line-base {
            fill: none;
            stroke: #cbd5e1;
            stroke-width: 2;
            stroke-dasharray: 4 6;
            animation: flow-dash 30s linear infinite reverse;
        }

        @keyframes flow-dash {
            100% { stroke-dashoffset: 1000; }
        }

        /* データパケットアニメーション (流れる光の粒) */
        .svg-data-packet {
            fill: none;
            stroke: var(--secondary);
            stroke-width: 4;
            stroke-linecap: round;
            stroke-dasharray: 0 200;
            filter: drop-shadow(0 0 8px var(--glow)) drop-shadow(0 0 12px var(--glow));
            animation: dash-flow 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        .svg-data-packet-2 {
            fill: none;
            stroke: #fff;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-dasharray: 0 200;
            filter: drop-shadow(0 0 5px #fff);
            animation: dash-flow 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        /* タイミングをずらす */
        .anim-delay-1 { animation-delay: 0s; }
        .anim-delay-2 { animation-delay: 0.4s; }
        .anim-delay-3 { animation-delay: 0.8s; }
        .anim-delay-4 { animation-delay: 1.2s; }
        .anim-delay-5 { animation-delay: 1.6s; }
        .anim-delay-6 { animation-delay: 2.0s; }

        @keyframes dash-flow {
            0% { stroke-dasharray: 0 200; stroke-dashoffset: 200; opacity: 0; }
            50% { stroke-dasharray: 30 200; opacity: 1; }
            100% { stroke-dasharray: 0 200; stroke-dashoffset: -50; opacity: 0; }
        }

        /* バックグラウンドパーティクル */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background-color: var(--secondary);
            border-radius: 50%;
            filter: blur(1px);
            animation: float 10s infinite linear;
            opacity: 0.3;
        }

        @keyframes float {
            0% { transform: translate(0, 0); opacity: 0; }
            20% { opacity: 0.5; }
            80% { opacity: 0.5; }
            100% { transform: translate(100px, -100px); opacity: 0; }
        }

        /* テキストボックス */
        .feature-box {
            position: absolute;
            width: 280px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 12px;
            padding: 20px;
            z-index: 5;
            display: flex;
            align-items: flex-start;
            gap: 16px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.1);
            animation: float-box 6s ease-in-out infinite alternate;
        }

        /* 各ボックスの浮遊アニメーションのタイミングをずらす */
        .pos-1 { animation-delay: 0s; }
        .pos-2 { animation-delay: -1s; }
        .pos-3 { animation-delay: -2s; }
        .pos-4 { animation-delay: -3s; }
        .pos-5 { animation-delay: -4s; }
        .pos-6 { animation-delay: -5s; }

        @keyframes float-box {
            0% { transform: translateY(0); }
            100% { transform: translateY(-10px); }
        }

        /* ホバー時の装飾枠（光るボーダー） */
        .feature-box::before {
            content: "";
            position: absolute;
            inset: -2px;
            border-radius: 14px;
            background: linear-gradient(45deg, var(--secondary), transparent, var(--glow), transparent);
            z-index: -1;
            opacity: 0;
            transition: opacity 0.4s ease;
            filter: blur(4px);
            background-size: 200% 200%;
            animation: gradient-shift 3s ease infinite;
        }

        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .feature-box:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 20px 40px -10px rgba(59, 130, 246, 0.2);
            border-color: transparent;
        }

        .feature-box:hover::before {
            opacity: 1;
        }

        .icon-circle {
            flex-shrink: 0;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .icon-circle img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05));
            transition: all 0.4s ease;
        }

        .icon-circle::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            box-shadow: 0 0 0 0 var(--secondary-glow);
            transition: all 0.4s;
        }

        .feature-box:hover .icon-circle {
            transform: translateY(-4px) scale(1.05);
        }

        .feature-box:hover .icon-circle img {
            filter: drop-shadow(0 8px 15px rgba(59, 130, 246, 0.3));
        }

        .feature-box:hover .icon-circle::after {
            animation: ripple 1.5s infinite;
        }

        @keyframes ripple {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
            100% { box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); }
        }

        .text-content {
            flex-grow: 1;
        }

        .feature-heading {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
            margin: 0 0 8px 0;
            position: relative;
            display: inline-block;
        }

        /* 見出しの下線アニメーション */
        .feature-heading::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 30px;
            height: 2px;
            background-color: #cbd5e1;
            transition: all 0.3s ease;
        }

        .feature-box:hover .feature-heading::after {
            width: 100%;
            background-color: var(--secondary);
        }

        .feature-desc {
            font-size: 12.5px;
            color: var(--text-muted);
            margin: 0;
            line-height: 1.6;
        }

        /* 座標指定 */
        .pos-1 { top: 2%; left: 50%; margin-left: -140px; }
        .pos-2 { top: 22%; right: 0%; flex-direction: row-reverse; text-align: right; }
        .pos-2 .feature-heading::after { left: auto; right: 0; }
        .pos-3 { top: 62%; right: 0%; flex-direction: row-reverse; text-align: right; }
        .pos-3 .feature-heading::after { left: auto; right: 0; }
        .pos-4 { bottom: -2%; left: 50%; margin-left: -140px; }
        .pos-5 { top: 62%; left: 0%; }
        .pos-6 { top: 22%; left: 0%; }

        @media (max-width: 900px) {
            .layout-wrapper { display: flex; flex-direction: column; align-items: center; gap: 30px; height: auto; padding: 20px 0; }
            .core-circle { position: relative; top: auto; left: auto; transform: none; margin-bottom: 20px; animation: pulse-core 4s infinite alternate; }
            
            @keyframes pulse-core-mobile {
                0% { box-shadow: 0 0 30px rgba(59, 130, 246, 0.4); transform: scale(0.95); }
                100% { box-shadow: 0 0 60px rgba(59, 130, 246, 0.8); transform: scale(1.05); }
            }
            .core-circle { animation: pulse-core-mobile 3s infinite alternate; }
            .core-circle::before, .core-circle::after { display: none; }
            .svg-layer { display: none; }
            
            .feature-box { 
                position: relative; top:auto !important; bottom:auto !important; left:auto !important; right:auto !important; 
                transform: none !important; width: 100%; max-width: 400px; 
                flex-direction: row !important; text-align: left !important;
                margin: 0 !important; animation: none;
            }
            .feature-box .feature-heading::after { left: 0; right: auto; }
        }
    </style>
</head>

<body>

    <div class="layout-wrapper">
        
        <!-- 背景パーティクル -->
        <div class="particle" style="top: 20%; left: 30%; animation-delay: 0s;"></div>
        <div class="particle" style="top: 60%; left: 80%; animation-delay: 2s; width: 6px; height: 6px;"></div>
        <div class="particle" style="top: 80%; left: 40%; animation-delay: 5s;"></div>
        <div class="particle" style="top: 10%; left: 70%; animation-delay: 7s; width: 3px; height: 3px;"></div>
        <div class="particle" style="top: 40%; left: 10%; animation-delay: 1s;"></div>
        <div class="particle" style="top: 70%; left: 20%; animation-delay: 4s;"></div>

        <!-- アニメーション配線 -->
        <svg class="svg-layer" viewBox="0 0 1000 625" preserveAspectRatio="xMidYMid meet">
            
            <defs>
                <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="5" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>
            </defs>

            <!-- 1 Top -->
            <path class="svg-line-base" id="path1" d="M500,312.5 L500,70" />
            <use href="#path1" class="svg-data-packet anim-delay-1" />
            <use href="#path1" class="svg-data-packet-2 anim-delay-1" />
            
            <!-- 2 Top Right -->
            <path class="svg-line-base" id="path2" d="M500,312.5 L800,200" />
            <use href="#path2" class="svg-data-packet anim-delay-2" />
            <use href="#path2" class="svg-data-packet-2 anim-delay-2" />
            
            <!-- 3 Bottom Right -->
            <path class="svg-line-base" id="path3" d="M500,312.5 L800,440" />
            <use href="#path3" class="svg-data-packet anim-delay-3" />
            <use href="#path3" class="svg-data-packet-2 anim-delay-3" />

            <!-- 4 Bottom -->
            <path class="svg-line-base" id="path4" d="M500,312.5 L500,560" />
            <use href="#path4" class="svg-data-packet anim-delay-4" />
            <use href="#path4" class="svg-data-packet-2 anim-delay-4" />

            <!-- 5 Bottom Left -->
            <path class="svg-line-base" id="path5" d="M500,312.5 L200,440" />
            <use href="#path5" class="svg-data-packet anim-delay-5" />
            <use href="#path5" class="svg-data-packet-2 anim-delay-5" />

            <!-- 6 Top Left -->
            <path class="svg-line-base" id="path6" d="M500,312.5 L200,200" />
            <use href="#path6" class="svg-data-packet anim-delay-6" />
            <use href="#path6" class="svg-data-packet-2 anim-delay-6" />
        </svg>

        <!-- 中央コア -->
        <div class="core-circle">
            <div class="center-title">
                <span>MERIT</span>
                <h2>6つの強み</h2>
            </div>
        </div>

        <!-- コンテンツ -->
        <div class="feature-box pos-1">
            <div class="icon-circle">
                <img src="./assets/icon_1.png" alt="希望に合ったお仕事 (検索)">
            </div>
            <div class="text-content">
                <h3 class="feature-heading">希望に合ったお仕事</h3>
                <p class="feature-desc">あなたのご希望をしっかりヒアリングし最適なお仕事をご提案します。</p>
            </div>
        </div>

        <div class="feature-box pos-2">
            <div class="icon-circle">
                <img src="./assets/icon_3.png" alt="職場見学が可能 (確認)">
            </div>
            <div class="text-content">
                <h3 class="feature-heading">職場見学が可能</h3>
                <p class="feature-desc">実際の職場の雰囲気を事前に確認できるので安心です。</p>
            </div>
        </div>

        <div class="feature-box pos-3">
            <div class="icon-circle">
                <img src="./assets/icon_6.png" alt="手厚いフォロー (握手)">
            </div>
            <div class="text-content">
                <h3 class="feature-heading">手厚いフォロー</h3>
                <p class="feature-desc">専任の担当者がいつでも相談に乗ります。</p>
            </div>
        </div>

        <div class="feature-box pos-4">
            <div class="icon-circle">
                <img src="./assets/icon_5.png" alt="社会保険・有給完備 (盾)">
            </div>
            <div class="text-content">
                <h3 class="feature-heading">社会保険・有給完備</h3>
                <p class="feature-desc">健康保険・厚生年金・雇用保険・有給休暇など福利厚生を完備。</p>
            </div>
        </div>

        <div class="feature-box pos-5">
            <div class="icon-circle">
                <img src="./assets/icon_4.png" alt="未経験OKの仕事多数 (研修)">
            </div>
            <div class="text-content">
                <h3 class="feature-heading">未経験OKの仕事多数</h3>
                <p class="feature-desc">研修制度やサポート体制がしっかりと整っています。</p>
            </div>
        </div>

        <div class="feature-box pos-6">
            <div class="icon-circle">
                <img src="./assets/icon_2.png" alt="多言語対応で安心 (地球儀)">
            </div>
            <div class="text-content">
                <h3 class="feature-heading">多言語対応で安心</h3>
                <p class="feature-desc">外国籍スタッフへの多言語でのきめ細かなサポートを行っています。</p>
            </div>
        </div>

    </div>

</body>

</html>
