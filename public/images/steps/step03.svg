  <line x1="43" y1="90" x2="48" y2="90"/>
  <!-- Briefcase -->
  <rect x="14" y="60" width="10" height="8" rx="1.5"/>
  <line x1="17" y1="60" x2="17" y2="58"/>
  <line x1="22" y1="60" x2="22" y2="58"/>
  <line x1="17" y1="58" x2="22" y2="58"/>
  <!-- Ground line -->
  <line x1="5" y1="95" x2="110" y2="95"/>
