<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" fill="none" stroke="#333333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Building -->
  <rect x="60" y="15" width="45" height="70" rx="2"/>
  <!-- Building windows row 1 -->
  <rect x="67" y="22" width="8" height="8" rx="1"/>
  <rect x="80" y="22" width="8" height="8" rx="1"/>
  <rect x="93" y="22" width="8" height="8" rx="1"/>
  <!-- Building windows row 2 -->
  <rect x="67" y="36" width="8" height="8" rx="1"/>
  <rect x="80" y="36" width="8" height="8" rx="1"/>
  <rect x="93" y="36" width="8" height="8" rx="1"/>
  <!-- Building windows row 3 -->
  <rect x="67" y="50" width="8" height="8" rx="1"/>
  <rect x="80" y="50" width="8" height="8" rx="1"/>
  <rect x="93" y="50" width="8" height="8" rx="1"/>
  <!-- Building door -->
  <rect x="77" y="68" width="12" height="17" rx="1"/>
  <circle cx="87" cy="77" r="1.2"/>
