<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" fill="none" stroke="#333333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Person head -->
  <circle cx="35" cy="28" r="9"/>
  <!-- Person body -->
  <line x1="35" y1="37" x2="35" y2="62"/>
  <!-- Arm pointing at document -->
  <line x1="35" y1="45" x2="22" y2="55"/>
  <line x1="35" y1="45" x2="55" y2="40"/>
  <!-- Legs -->
  <line x1="35" y1="62" x2="25" y2="82"/>
  <line x1="35" y1="62" x2="45" y2="82"/>
  <!-- Feet -->
  <line x1="25" y1="82" x2="20" y2="82"/>
  <line x1="45" y1="82" x2="50" y2="82"/>
  <!-- Document/presentation board -->
  <rect x="62" y="20" width="40" height="50" rx="3"/>
  <!-- Document lines -->
  <line x1="70" y1="32" x2="94" y2="32"/>
  <line x1="70" y1="38" x2="94" y2="38"/>
  <line x1="70" y1="44" x2="90" y2="44"/>
  <line x1="70" y1="50" x2="94" y2="50"/>
  <line x1="70" y1="56" x2="86" y2="56"/>
  <!-- Pointer hand indicator -->
  <line x1="55" y1="40" x2="62" y2="38"/>
  <!-- Stand for presentation -->
  <line x1="82" y1="70" x2="82" y2="90"/>
  <line x1="72" y1="90" x2="92" y2="90"/>
  <!-- Small checkmarks on document -->
  <polyline points="67,32 68.5,34 71,30"/>
  <polyline points="67,38 68.5,40 71,36"/>
  <!-- Ground line -->
  <line x1="10" y1="95" x2="110" y2="95"/>
</svg>
