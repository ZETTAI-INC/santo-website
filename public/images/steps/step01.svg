<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" fill="none" stroke="#333333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Desk -->
  <rect x="15" y="68" width="90" height="4" rx="1"/>
  <line x1="20" y1="72" x2="20" y2="95"/>
  <line x1="100" y1="72" x2="100" y2="95"/>
  <!-- Person head -->
  <circle cx="55" cy="30" r="9"/>
  <!-- Person body -->
  <line x1="55" y1="39" x2="55" y2="60"/>
  <!-- Arms reaching to desk -->
  <line x1="55" y1="46" x2="40" y2="58"/>
  <line x1="55" y1="46" x2="70" y2="55"/>
  <!-- Legs on chair -->
  <line x1="55" y1="60" x2="45" y2="75"/>
  <line x1="55" y1="60" x2="65" y2="75"/>
  <!-- Chair -->
  <line x1="42" y1="58" x2="68" y2="58"/>
  <line x1="55" y1="58" x2="55" y2="65"/>
  <!-- Clipboard on desk -->
  <rect x="30" y="55" width="14" height="18" rx="1"/>
  <line x1="33" y1="60" x2="41" y2="60"/>
  <line x1="33" y1="63" x2="41" y2="63"/>
  <line x1="33" y1="66" x2="39" y2="66"/>
  <!-- Clipboard clip -->
  <rect x="34" y="53" width="6" height="4" rx="1"/>
  <!-- Reception sign -->
  <rect x="78" y="50" width="18" height="18" rx="2"/>
  <line x1="82" y1="56" x2="92" y2="56"/>
  <line x1="82" y1="60" x2="92" y2="60"/>
  <line x1="82" y1="64" x2="88" y2="64"/>
</svg>
